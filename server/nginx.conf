server {
    listen 80;
    server_name datalog-blog.ru www.datalog-blog.ru;
    return 301 https://datalog-blog.ru$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.datalog-blog.ru;

    ssl_certificate /etc/letsencrypt/live/datalog-blog.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datalog-blog.ru/privkey.pem;

    return 301 https://datalog-blog.ru$request_uri;
}

server {
    listen 443 ssl http2;
    server_name datalog-blog.ru;

    ssl_certificate /etc/letsencrypt/live/datalog-blog.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datalog-blog.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/datalog;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML — short cache for fresh content
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Sitemap & RSS
    location = /sitemap-index.xml {
        expires 1d;
    }
    location = /rss.xml {
        expires 1h;
    }

    # SPA-like routing for Astro static pages
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
}
